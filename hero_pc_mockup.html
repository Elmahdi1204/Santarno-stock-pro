<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero {
    position: relative;
    width: 100%;
    max-width: 1100px;
    padding: 40px 20px;
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 40px;
    align-items: center;
  }

  /* ── TEXT SIDE ── */
  .hero-text { z-index: 10; }

  .badges { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
    border: 1px solid;
  }
  .badge-blue  { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
  .badge-gray  { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }

  .badge svg { width: 13px; height: 13px; }

  h1 {
    font-size: clamp(26px, 4vw, 44px);
    font-weight: 900; color: #0f172a;
    line-height: 1.3; margin-bottom: 16px;
  }
  h1 span { color: #2563eb; }

  p {
    font-size: 15px; color: #64748b;
    line-height: 1.9; max-width: 440px; margin-bottom: 30px;
  }

  .btns { display: flex; gap: 12px; flex-wrap: wrap; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: #2563eb; color: #fff;
    padding: 14px 28px; border-radius: 12px;
    font-weight: 700; font-size: 14px; font-family: 'Cairo',sans-serif;
    border: none; cursor: pointer;
    box-shadow: 0 8px 24px rgba(37,99,235,.35);
    transition: transform .2s, box-shadow .2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37,99,235,.45); }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: #0f172a;
    padding: 14px 28px; border-radius: 12px;
    font-weight: 700; font-size: 14px; font-family: 'Cairo',sans-serif;
    border: 2px solid #e2e8f0; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-secondary:hover { border-color: #2563eb; color: #2563eb; }

  /* ── PC MOCKUP ── */
  .pc-wrapper {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    z-index: 5;
  }

  /* Monitor */
  .monitor {
    position: relative;
    background: #1e293b;
    border-radius: 16px 16px 0 0;
    padding: 10px;
    box-shadow:
      0 0 0 2px #334155,
      0 30px 80px rgba(15,23,42,.4),
      inset 0 1px 0 rgba(255,255,255,.08);
    width: 100%;
    max-width: 520px;
  }

  .monitor-bezel {
    background: #0f172a;
    border-radius: 10px 10px 0 0;
    padding: 6px 6px 0;
  }

  .monitor-screen {
    background: #1e293b;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16/10;
    position: relative;
    border: 1px solid #334155;
  }

  .monitor-screen img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    border-radius: 7px;
  }

  /* fallback gradient when image missing */
  .screen-fallback {
    width: 100%; height: 100%;
    background: linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: #64748b; font-size: 12px; text-align: center;
  }
  .screen-fallback .icon { font-size: 40px; }

  /* Camera dot */
  .camera-dot {
    width: 8px; height: 8px;
    background: #334155; border-radius: 50%;
    margin: 0 auto 4px;
  }

  /* Stand neck */
  .stand-neck {
    width: 40px; height: 24px;
    background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
    margin: 0 auto;
    clip-path: polygon(20% 0,80% 0,100% 100%,0 100%);
  }

  /* Stand base */
  .stand-base {
    width: 140px; height: 14px;
    background: linear-gradient(180deg, #334155, #1e293b);
    border-radius: 6px;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }

  /* ── FLOATING CARDS ── */
  .float-card {
    position: absolute;
    background: #fff;
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 8px 32px rgba(15,23,42,.14), 0 0 0 1px rgba(255,255,255,.9);
    display: flex; align-items: center; gap: 10px;
    min-width: 140px;
    z-index: 20;
    backdrop-filter: blur(8px);
    animation: floaty 4s ease-in-out infinite;
  }

  .float-card .icon-wrap {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .float-card .icon-wrap svg { width: 18px; height: 18px; }

  .float-card .label { font-size: 10px; color: #94a3b8; font-weight: 600; }
  .float-card .value { font-size: 14px; color: #0f172a; font-weight: 800; }

  /* positions & delays */
  .card-stock  { top: 5%;  left: -18%; animation-delay: 0s;   animation-duration: 3.8s; }
  .card-client { top: 30%; right: -20%; animation-delay: .8s;  animation-duration: 4.2s; }
  .card-produit{ bottom: 22%; left: -16%; animation-delay: 1.4s; animation-duration: 3.6s; }
  .card-barcode{ bottom: 5%; right: -18%; animation-delay: 2s;  animation-duration: 4.5s; }

  @keyframes floaty {
    0%,100% { transform: translateY(0px) rotate(-1deg); }
    50%      { transform: translateY(-10px) rotate(1deg); }
  }

  /* icon colors */
  .blue-icon   { background: #dbeafe; color: #2563eb; }
  .green-icon  { background: #dcfce7; color: #16a34a; }
  .orange-icon { background: #ffedd5; color: #ea580c; }
  .purple-icon { background: #ede9fe; color: #7c3aed; }

  /* glow blobs */
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(60px); pointer-events: none; z-index: 0;
  }
  .blob-1 { width: 280px; height: 280px; background: rgba(37,99,235,.12); top: -60px; right: -40px; }
  .blob-2 { width: 200px; height: 200px; background: rgba(22,163,74,.10); bottom: -40px; left: 20px; }

  /* Entrance animations */
  .hero-text   { animation: slideInRight .7s ease both; }
  .pc-wrapper  { animation: slideInLeft  .7s .2s ease both; }

  @keyframes slideInRight {
    from { opacity:0; transform: translateX(30px); }
    to   { opacity:1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity:0; transform: translateX(-30px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .float-card { animation: floaty 4s ease-in-out infinite, cardIn .5s ease both; }
  .card-stock  { animation-delay: .6s, .6s; }
  .card-client { animation-delay: 1.2s, 1.2s; }
  .card-produit{ animation-delay: .9s, .9s; }
  .card-barcode{ animation-delay: 1.5s, 1.5s; }

  @keyframes cardIn {
    from { opacity:0; transform: scale(.8); }
    to   { opacity:1; transform: scale(1); }
  }

  /* responsive */
  @media(max-width: 760px) {
    .hero { grid-template-columns:1fr; text-align:center; }
    p { margin-inline: auto; }
    .badges,.btns { justify-content:center; }
    .card-stock  { left:-10px; }
    .card-client { right:-10px; }
    .card-produit{ left:-10px; }
    .card-barcode{ right:-10px; }
  }
</style>
</head>
<body>

<section class="hero">

  <!-- TEXT -->
  <div class="hero-text">
    <div class="badges">
      <span class="badge badge-blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M12 20h.01"/></svg>
        يعمل بدون إنترنت
      </span>
      <span class="badge badge-gray">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Desktop Software
      </span>
    </div>

    <h1>
      نظام احترافي لإدارة <br>
      <span>المخزون والمبيعات</span> على جهازك
    </h1>

    <p>
      برنامج مكتبي محلي يساعدك على إدارة المخزون والعملاء والموردين والمنتجات
      بسهولة وبدقة عالية، بدون الحاجة إلى الإنترنت.
    </p>

    <div class="btns">
      <button class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        تحميل البرنامج
      </button>
      <button class="btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        تواصل معنا
      </button>
    </div>
  </div>

  <!-- PC MOCKUP -->
  <div class="pc-wrapper">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Floating cards -->
    <div class="float-card card-stock">
      <div class="icon-wrap blue-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      </div>
      <div>
        <div class="label">المخزون</div>
        <div class="value">1,248 صنف</div>
      </div>
    </div>

    <div class="float-card card-client">
      <div class="icon-wrap green-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div>
        <div class="label">العملاء</div>
        <div class="value">340 عميل</div>
      </div>
    </div>

    <div class="float-card card-produit">
      <div class="icon-wrap orange-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </div>
      <div>
        <div class="label">المنتجات</div>
        <div class="value">87 منتج</div>
      </div>
    </div>

    <div class="float-card card-barcode">
      <div class="icon-wrap purple-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5v14M7 5v14M13 5v14M17 5v14M21 5v14M3 5h2M3 19h2M7 5h1M7 19h1M13 5h1M13 19h1M17 5h1M17 19h1M21 5h-2M21 19h-2"/></svg>
      </div>
      <div>
        <div class="label">باركود</div>
        <div class="value">مدمج</div>
      </div>
    </div>

    <!-- Monitor body -->
    <div class="monitor">
      <div class="monitor-bezel">
        <div class="camera-dot"></div>
        <div class="monitor-screen">
          <img src="DASHBOARD.PNG" alt="Dashboard" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="screen-fallback" style="display:none;">
            <div class="icon">🖥️</div>
            <div>DASHBOARD.PNG</div>
            <div style="font-size:10px;color:#475569">لوحة التحكم</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stand -->
    <div class="stand-neck"></div>
    <div class="stand-base"></div>
  </div>

</section>

</body>
</html>
